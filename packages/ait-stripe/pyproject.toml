[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ait-stripe"
version = "1.0.0"
description = "Stripe API CLI tools"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "ait-core>=1.0.0",
  "httpx>=0.28.1",
  "pydantic>=2.10.6",
  "typer>=0.15.2",
  "rich>=13.9.4",
]

[project.scripts]
ait-stripe = "ait_stripe.cli:app"

[project.entry-points."ait.tools"]
stripe = "ait_stripe.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/ait_stripe"]
