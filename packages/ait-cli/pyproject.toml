[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ait-cli"
version = "1.0.0"
description = "Unified umbrella CLI for the AI Toolset — the `ait` command"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "AI Toolset Contributors" }
]
dependencies = [
  "ait-core>=1.0.0",
  "typer>=0.15.2",
  "rich>=13.9.4",
]

[project.scripts]
ait = "ait_cli.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/ait_cli"]
