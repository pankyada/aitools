[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ait-memory"
version = "0.1.0"
description = "Local memory and semantic search tooling"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "ait-core>=0.1.0",
  "pydantic>=2.10.6",
  "typer>=0.15.2",
  "rich>=13.9.4",
  "ulid-py>=1.1.0",
]

[project.optional-dependencies]
local-embeddings = ["sentence-transformers>=3.4.1"]

[project.scripts]
ait-memory = "ait_memory.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/ait_memory"]
