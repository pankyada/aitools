name: Build Binaries

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        package: [ait-gmail, ait-gdrive, ait-gcal, ait-xai, ait-memory, ait-resend, ait-sendgrid]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install package and pyinstaller
        run: |
          uv sync --all-packages
          uv pip install pyinstaller

      - name: Build binary
        shell: bash
        run: |
          SCRIPT_NAME="${{ matrix.package }}"
          ENTRY_MODULE="${SCRIPT_NAME//-/_}.cli"
          pyinstaller --onefile --name "${SCRIPT_NAME}-${{ runner.os }}-${{ runner.arch }}" -m "$ENTRY_MODULE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ runner.os }}-${{ runner.arch }}
          path: dist/*
