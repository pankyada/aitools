name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: |
          uv build
          for pkg in packages/ait-core packages/ait-xai packages/ait-gmail packages/ait-gdrive packages/ait-gcal packages/ait-memory packages/ait-resend packages/ait-sendgrid packages/ait-social; do
            (cd "$pkg" && uv build)
          done

      - name: Generate checksums
        run: |
          find . -type f \( -name "*.whl" -o -name "*.tar.gz" \) -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*
            packages/**/dist/*
            SHA256SUMS

  trigger-binaries:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Trigger binary build workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-binaries.yml',
              ref: context.ref,
            });
